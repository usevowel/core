services:
  core:
    build: .
    ports:
      - "3000:3000"
    environment:
      VOWEL_ENGINE_URL: http://vowel-engine:8787
      VOWEL_ENGINE_API_KEY: ${VOWEL_ENGINE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      DB_PATH: /app/data/core.db
    volumes:
      - ./data:/app/data